services:
  postgres:
    image: postgres:17
    container_name: dermalog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dermalog
    ports:
      - "5434:5432"
    volumes:
      - dermalog_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dermalog"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dermalog_pgdata:
